<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 210" role="img" aria-labelledby="title desc">
  <title id="title">CS605 proof workflow</title>
  <desc id="desc">A workflow from understanding the language to selecting the proof tool, applying the template, and checking the final conclusion.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f5d50"/>
    </marker>
  </defs>
  <rect width="980" height="210" rx="18" fill="#f7faf8"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <g fill="#fff" stroke="#8bb7a6" stroke-width="2">
      <rect x="36" y="54" width="150" height="100" rx="12"/>
      <rect x="230" y="54" width="150" height="100" rx="12"/>
      <rect x="424" y="54" width="150" height="100" rx="12"/>
      <rect x="618" y="54" width="150" height="100" rx="12"/>
      <rect x="812" y="54" width="132" height="100" rx="12"/>
    </g>
    <g stroke="#2f5d50" stroke-width="2.3" marker-end="url(#arrow)">
      <path d="M186 104 H222"/>
      <path d="M380 104 H416"/>
      <path d="M574 104 H610"/>
      <path d="M768 104 H804"/>
    </g>
    <g text-anchor="middle" fill="#18362f" font-weight="700" font-size="16">
      <text x="111" y="88">Read</text>
      <text x="111" y="111">Language</text>
      <text x="305" y="88">Choose</text>
      <text x="305" y="111">Tool</text>
      <text x="499" y="88">Use</text>
      <text x="499" y="111">Template</text>
      <text x="693" y="88">Explain</text>
      <text x="693" y="111">Why</text>
      <text x="878" y="88">Final</text>
      <text x="878" y="111">Claim</text>
    </g>
    <g text-anchor="middle" fill="#5c6f68" font-size="12">
      <text x="111" y="135">what strings?</text>
      <text x="305" y="135">pumping / TM / reduction</text>
      <text x="499" y="135">fill exact objects</text>
      <text x="693" y="135">contradiction / runtime</text>
      <text x="878" y="135">therefore...</text>
    </g>
  </g>
</svg>
